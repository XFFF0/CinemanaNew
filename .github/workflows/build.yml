name: Build Unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Stamp build info
        run: |
          cat > CinemanaNew/Utils/BuildInfo.swift << EOF
          import Foundation
          enum BuildInfo {
              static let label = "build #${{ github.run_number }} · ${GITHUB_SHA:0:7}"
          }
          EOF

      - name: Generate Xcode project
        run: python3 scripts/generate_project.py

      - name: Build (unsigned, for simulator/device generic archive)
        run: |
          set -o pipefail
          xcodebuild -project CinemanaNew.xcodeproj \
            -scheme CinemanaNew \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build 2>&1 | tee build_log.txt

      - name: Publish build log to orphan branch (always, for debugging)
        if: always()
        run: |
          git config user.email "ci@cinemananew.local"
          git config user.name "CI Bot"
          mkdir -p /tmp/logs-worktree
          cp build_log.txt /tmp/build_log.txt || echo "no log" > /tmp/build_log.txt
          cd /tmp/logs-worktree
          git init -q
          git checkout -q --orphan build-logs
          cp /tmp/build_log.txt ./build_log.txt
          git add build_log.txt
          git commit -q -m "Build log for run ${{ github.run_id }}"
          git remote add origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          git push -f origin build-logs

      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/CinemanaNew.app Payload/
          zip -r CinemanaNew-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: CinemanaNew-unsigned-ipa
          path: CinemanaNew-unsigned.ipa
          retention-days: 14
