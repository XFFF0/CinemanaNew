name: Sign & Export
on:
  workflow_dispatch:
jobs:
  sign:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Archive
        uses: actions/download-artifact@v4
        with:
          name: CinemanaNew.xcarchive
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath ./CinemanaNew.xcarchive \
            -exportPath ./CinemanaNew \
            -method local
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CinemanaNew.ipa
          path: ./CinemanaNew/CinemanaNew.ipa
